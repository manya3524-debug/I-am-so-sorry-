<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>I'm Sorry ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9eb5,#ffd6df);
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.card{
    background:white;
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
    color:#ff4f81;
}

button{
    padding:12px 22px;
    border:none;
    border-radius:20px;
    margin:10px;
    font-size:16px;
    cursor:pointer;
}

.yes{
    background:#ff4f81;
    color:white;
}

.no{
    background:#ddd;
    position:absolute;
}

.heart{
    font-size:70px;
    animation:beat 1s infinite;
}

@keyframes beat{
    50%{
        transform:scale(1.2);
    }
}
</style>
</head>

<body>

<div class="card">
    <div class="heart">❤️</div>

    <h1>I'm Really Sorry</h1>

    <p>
        I know I messed up.<br>
        Please give me one chance 😭
    </p>

    <button class="yes" onclick="forgive()">
        Okay, I forgive you ❤️
    </button>

    <button class="no" id="noBtn">
        No 😤
    </button>

    <h2 id="msg"></h2>
</div>

<script>
function forgive(){
    document.getElementById("msg").innerHTML =
    "YAYYYYY ❤️😭 THANK YOU";
}

const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover",()=>{
    const x = Math.random()*(window.innerWidth-150);
    const y = Math.random()*(window.innerHeight-100);

    noBtn.style.left = x+"px";
    noBtn.style.top = y+"px";
});
</script>

</body>
</html>
