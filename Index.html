    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffb6c1,#ffd6e0);
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.card{
    background:white;
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    max-width:400px;
}

.heart{
    font-size:70px;
    animation:beat 1s infinite;
}

@keyframes beat{
    50%{
        transform:scale(1.2);
    }
}

h1{
    color:#ff4f81;
    margin:15px 0;
}

p{
    color:#555;
    margin-bottom:20px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    font-size:16px;
    margin:8px;
}

.yes{
    background:#ff4f81;
    color:white;
}

.no{
    background:#e5e5e5;
    position:absolute;
}

#message{
    margin-top:20px;
    color:#ff4f81;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
    <div class="heart">❤️</div>

    <h1>I'm Really Sorry</h1>

    <p>
        I know I messed up.<br>
        Please forgive me 😭
    </p>

    <button class="yes" onclick="forgiveMe()">
        Okay, I forgive you ❤️
    </button>

    <button class="no" id="noBtn">
        No 😤
    </button>

    <div id="message"></div>
</div>

<script>
function forgiveMe(){
    document.getElementById("message").innerHTML =
    "YAYYY ❤️ Thank you for forgiving me 😭";
}

const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", function(){
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 80);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});
</script>

</body>
</html>
