<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Am Sorry 🐧</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  height:100vh;
  overflow:hidden;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#fffaf2,#ffd6dc);
  position:relative;
}

.float{
  position:absolute;
  font-size:28px;
  opacity:.45;
  animation:softFloat 5s infinite ease-in-out;
}

@keyframes softFloat{
  50%{transform:translateY(-15px)}
}

.mainBox{
  position:absolute;
  top:42%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  width:90%;
}

h1{
  font-size:28px;
  color:#1d1111;
  margin-bottom:20px;
}

button{
  border:none;
  padding:16px 28px;
  border-radius:22px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  transition:.3s;
}

#yesBtn{
  background:#b00000;
  color:white;
  box-shadow:0 8px 20px rgba(176,0,0,.3);
}

#noBtn{
  position:absolute;
  background:white;
  color:#1d1111;
  border:3px solid #b00000;
  box-shadow:0 8px 18px rgba(0,0,0,.18);
  transform:rotate(-12deg);
}

#msg{
  margin-top:22px;
  color:#b00000;
  font-weight:bold;
  font-size:18px;
}
</style>
</head>

<body>

<div class="float" style="top:8%;left:8%;">🥺</div>
<div class="float" style="top:15%;right:9%;">💙</div>
<div class="float" style="top:28%;right:13%;">😢</div>
<div class="float" style="top:38%;right:6%;">💔</div>
<div class="float" style="top:58%;left:8%;">💗</div>
<div class="float" style="top:62%;right:18%;">💖</div>
<div class="float" style="bottom:18%;left:7%;">✨</div>
<div class="float" style="bottom:12%;right:8%;">💕</div>

<div class="mainBox">
  <h1>Zyaan, will you forgive me? 🥺</h1>

  <button id="yesBtn" onclick="yesClicked()">
    I Forgive You 💙
  </button>

  <div id="msg"></div>
</div>

<button id="noBtn" onclick="noClicked()">
  I’ll write you a poem 📝
</button>

<script>
let noCount = 0;

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const msg = document.getElementById("msg");

const noTexts = [
  "I’ll write you a poem 📝",
  "I’ll say sorry again 🐧",
  "Okay okay I deserve this 😭",
  "Tiny penguin request 🥺",
  "Last last chance 🤌",
  "Please reconsider 😤",
  "I am genuinely sorry ❤️"
];

function moveNoButton(){
  const x = Math.random() * (window.innerWidth - 220);
  const y = Math.random() * (window.innerHeight - 90);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  const angle = Math.floor(Math.random() * 40) - 20;
  noBtn.style.transform = "rotate(" + angle + "deg)";
}

function noClicked(){
  noBtn.innerHTML = noTexts[noCount % noTexts.length];
  moveNoButton();

  yesBtn.style.fontSize = (18 + noCount * 2) + "px";
  yesBtn.style.padding = (16 + noCount * 2) + "px " + (28 + noCount * 4) + "px";

  noCount++;
}

function yesClicked(){
  msg.innerHTML = "Thank you 😭❤️<br>I really mean it.";
  noBtn.style.display = "none";
}

moveNoButton();
</script>

</body>
</html>
