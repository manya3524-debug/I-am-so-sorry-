      <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Am So Sorry 🐧❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial,sans-serif;
  overflow:hidden;
  background:linear-gradient(135deg,#dff6ff,#fff0f6);
}

.penguin-bg{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
}

.penguin{
  position:absolute;
  font-size:28px;
  animation:float 8s linear infinite;
  opacity:.75;
}

@keyframes float{
  from{transform:translateY(110vh) rotate(0deg)}
  to{transform:translateY(-20vh) rotate(360deg)}
}

.card{
  width:90%;
  max-width:420px;
  background:white;
  padding:32px 24px;
  border-radius:28px;
  text-align:center;
  box-shadow:0 12px 35px rgba(0,0,0,.18);
  position:relative;
  z-index:2;
}

.big-penguin{
  font-size:80px;
  animation:bounce 1.2s infinite;
}

@keyframes bounce{
  50%{transform:translateY(-10px)}
}

h1{
  color:#ff4f81;
  margin:15px 0;
}

p{
  color:#444;
  line-height:1.6;
  margin-bottom:20px;
}

button{
  border:none;
  padding:13px 20px;
  border-radius:25px;
  margin:8px;
  font-size:15px;
  cursor:pointer;
}

.yes{
  background:#ff4f81;
  color:white;
}

.no{
  background:#e6e6e6;
}

#msg{
  margin-top:18px;
  color:#ff4f81;
  font-weight:bold;
  line-height:1.6;
}

.small{
  font-size:13px;
  color:#777;
  margin-top:14px;
}
</style>
</head>

<body>

<div class="penguin-bg" id="penguins"></div>

<div class="card">
  <div class="big-penguin">🐧</div>

  <h1>I'm Really Sorry ❤️</h1>

  <p>
    I know things got messy.<br>
    I know I reacted badly sometimes.<br>
    But you matter to me a lot, okay? 😭
  </p>

  <button class="yes" onclick="forgiveMe()">
    Okay, I forgive you ❤️
  </button>

  <button class="no" onclick="nope()">
    No, still angry 😤
  </button>

  <div id="msg"></div>

  <div class="small">
    from your dramatic little penguin 🐧
  </div>
</div>

<script>
const bg = document.getElementById("penguins");

for(let i=0;i<22;i++){
  const p = document.createElement("div");
  p.className = "penguin";
  p.innerHTML = "🐧";
  p.style.left = Math.random()*100 + "vw";
  p.style.animationDelay = Math.random()*8 + "s";
  p.style.animationDuration = 6 + Math.random()*6 + "s";
  bg.appendChild(p);
}

function forgiveMe(){
  document.getElementById("msg").innerHTML =
  "YAYYY 😭❤️<br>I promise I’ll try better.<br>No more unnecessary drama... okay maybe little bit 🐧";
}

function nope(){
  document.getElementById("msg").innerHTML =
  "Wrong button 😭<br>This penguin refuses rejection 🐧❤️";
}
</script>

</body>
</html>
